<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新可能RAGシステム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 25px; }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #question-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        #question-input:focus { outline: none; border-color: #667eea; }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .status.loading { display: block; background: #e3f2fd; color: #1976d2; }
        .status.error { display: block; background: #ffebee; color: #c62828; }
        
        .rag-result { margin-top: 20px; }
        
        .answer-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        .answer-box.updated {
            border-left-color: #4caf50;
            background: #f1f8e9;
        }
        
        .date-warning {
            background: #fff3e0;
            border: 1px solid #ffb74d;
            border-radius: 8px;
            padding: 12px 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-warning .warning-icon { font-size: 1.3em; }
        .date-warning .current-year { color: #e65100; font-weight: bold; }
        
        .date-info {
            background: #e3f2fd;
            border-radius: 8px;
            padding: 12px 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .refresh-section {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #26a69a, #00897b);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(38, 166, 154, 0.4);
        }
        .refresh-btn:disabled { opacity: 0.5; cursor: wait; }
        .refresh-hint {
            margin-top: 10px;
            color: #666;
            font-size: 0.9em;
        }
        
        .web-results {
            background: #e8f5e9;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .web-results h4 { color: #2e7d32; margin-bottom: 10px; }
        .retrieved-at { color: #558b2f; font-size: 0.85em; margin-bottom: 15px; }
        
        .web-result-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #4caf50;
        }
        .web-result-item strong { color: #1b5e20; }
        .web-result-item p { margin: 8px 0; color: #555; font-size: 0.95em; }
        .source-link { color: #1976d2; text-decoration: none; font-size: 0.85em; }
        .source-link:hover { text-decoration: underline; }
        
        .regenerate-btn {
            background: linear-gradient(135deg, #7c4dff, #651fff);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .regenerate-btn:hover { transform: translateY(-2px); }
        
        .regenerated-answer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #4caf50;
        }
        .regenerated-answer h4 { color: #2e7d32; margin-bottom: 10px; }
        
        .sources-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .sources-section h4 { color: #666; margin-bottom: 15px; }
        .source-item {
            background: #fafafa;
            padding: 12px;
            border-radius: 6px;
            margin: 8px 0;
            border-left: 3px solid #9e9e9e;
        }
        .source-item .score { color: #999; font-size: 0.85em; margin-left: 10px; }
        .source-item p { margin-top: 8px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 更新可能RAGシステム</h1>
        <p class="subtitle">知識ベース検索 + 手動での最新情報取得</p>
        
        <div class="status" id="status"></div>
        
        <div class="input-section">
            <input type="text" id="question-input" 
                   placeholder="質問を入力（例: 阪神タイガースの戦績を教えて）" 
                   disabled>
            <button class="btn btn-primary" id="ask-btn" onclick="askQuestion()" disabled>
                🔍 検索
            </button>
        </div>
        
        <div id="result-container"></div>
    </div>

    <script src="js/config.js"></script>
        <script src="js/secrets.js"></script>
    <script src="js/llm-client.js"></script>
    <script src="js/vector-search.js"></script>
    <script src="js/ontology.js"></script>
    <script src="js/concept-extractor.js"></script>
    <script src="js/learning-support.js"></script>
    <script src="js/hybrid-search.js"></script>
    <script src="js/semantic-rag.js"></script>
    <script src="js/web-search-client.js"></script>
    <script src="js/refreshable-rag.js"></script>
    
    <script>
        let ragSystem;
        
        function showStatus(message, type = 'loading') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                showStatus('🚀 システムを初期化中...', 'loading');
                
                const [docsRes, ontoRes] = await Promise.all([
                    fetch('data/sample-documents.json'),
                    fetch('data/learning-ontology.json')
                ]);
                
                const docs = await docsRes.json();
                const onto = await ontoRes.json();
                
                ragSystem = new RefreshableRAGSystem();
                await ragSystem.initialize(docs.documents, onto);
                
                document.getElementById('question-input').disabled = false;
                document.getElementById('ask-btn').disabled = false;
                
                showStatus('✅ 準備完了！', 'success');
                setTimeout(() => {
                    document.getElementById('status').style.display = 'none';
                }, 2000);
                
            } catch (error) {
                console.error('初期化エラー:', error);
                showStatus('❌ エラー: ' + error.message, 'error');
            }
        });
        
        async function askQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            if (!question) { alert('質問を入力してください'); return; }
            
            try {
                showStatus('🔍 知識ベースを検索中...', 'loading');
                document.getElementById('ask-btn').disabled = true;
                
                const result = await ragSystem.query(question, { learnerLevel: 'intermediate' });
                ragSystem.displayResult(result, document.getElementById('result-container'));
                
                document.getElementById('status').style.display = 'none';
            } catch (error) {
                console.error('検索エラー:', error);
                showStatus('❌ エラー: ' + error.message, 'error');
            } finally {
                document.getElementById('ask-btn').disabled = false;
            }
        }
        
        async function fetchAndDisplayLatest() {
            const btn = document.querySelector('.refresh-btn');
            const originalText = btn.textContent;
            
            try {
                btn.disabled = true;
                btn.textContent = '🔄 検索中...';
                
                const webResult = await ragSystem.fetchLatestInfo();
                ragSystem.displayWebResults(webResult);
                
            } catch (error) {
                console.error('Web検索エラー:', error);
                alert('最新情報の取得に失敗しました: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
        
        async function regenerateAnswer() {
            const btn = document.querySelector('.regenerate-btn');
            const originalText = btn.textContent;
            
            try {
                btn.disabled = true;
                btn.textContent = '✨ 生成中...';
                
                const result = await ragSystem.regenerateWithLatestInfo();
                ragSystem.displayWebResults(ragSystem.webSearchResult, result);
                
            } catch (error) {
                console.error('再生成エラー:', error);
                alert('回答の再生成に失敗しました: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
        
        document.getElementById('question-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('ask-btn').disabled) {
                askQuestion();
            }
        });
    </script>
</body>
</html>
