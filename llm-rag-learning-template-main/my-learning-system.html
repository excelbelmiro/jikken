<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私の学習支援システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        
        /* 以下、自由にスタイル追加 */
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        #response-area {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 100px;
            display: none;
        }
        
        #response-area.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .sidebar-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .sidebar-section h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 私の学習支援システム</h1>
            <p>LLM × RAG × オントロジーで作る、自分専用の学習ツール</p>
        </header>
        
        <div class="main-grid">
            <!-- メインエリア -->
            <div class="card">
                <h2>💬 質問・学習エリア</h2>
                
                <div class="input-group">
                    <input 
                        type="text" 
                        id="question-input" 
                        placeholder="質問を入力してください..."
                        onkeypress="if(event.key==='Enter') processQuestion()"
                    />
                </div>
                
                <button onclick="processQuestion()">質問する</button>
                <button onclick="clearResponse()" style="background: #6c757d;">クリア</button>
                
                <div id="response-area"></div>
                
                <!-- ここに自分の機能を追加 -->
                <div id="custom-features" style="margin-top: 30px;">
                    <!-- 自由に機能を追加する場所 -->
                </div>
            </div>
            
            <!-- サイドバー -->
            <div>
                <div class="card">
                    <h2>📊 情報パネル</h2>
                    
                    <div class="sidebar-section">
                        <h3>システム状態</h3>
                        <div id="system-status">初期化中...</div>
                    </div>
                    
                    <div class="sidebar-section">
                        <h3>統計情報</h3>
                        <div id="statistics">データなし</div>
                    </div>
                    
                    <!-- ここに自分の機能を追加 -->
                    <div id="custom-sidebar">
                        <!-- 自由に機能を追加する場所 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 既存のスクリプトを読み込み -->
    <script src="js/config.js"></script>
    <script src="js/llm-client.js"></script>
    <script src="js/vector-search.js"></script>
    <script src="js/ontology.js"></script>
    <script src="js/concept-extractor.js"></script>
    <script src="js/semantic-rag.js"></script>
    
    <script>
        // グローバル変数
        let semanticRAG;
        let questionCount = 0;
        
        // 初期化
        // async function initialize() {
        //     console.log('🚀 システム初期化中...');
        //     updateStatus('初期化中...');
            
        //     try {
        //         // SemanticRAGシステムの初期化
        //         semanticRAG = new SemanticRAGSystem();
        //         await semanticRAG.initialize();
                
        //         updateStatus('✅ 準備完了');
        //         updateStatistics();
                
        //         console.log('✅ システム準備完了');
        //     } catch (error) {
        //         console.error('初期化エラー:', error);
        //         updateStatus('❌ 初期化失敗');
        //     }
        // }
        // 初期化
async function initialize() {
    console.log('🚀 システム初期化中...');
    updateStatus('初期化中...');

    try {
        // (1) 文書データを読み込む（例: docs/*.json をまとめてもOK）
        const documents = [
            { id: 'sample1', content: '電流とは電荷の流れのことです。' },
            { id: 'sample2', content: 'オームの法則は V = IR である。' }
        ];

        // (2) オントロジーファイルを読み込む
        const ontologyData = await fetch('./data/learning-ontology.json').then(r => r.json());

        // (3) SemanticRAGシステムの初期化
        semanticRAG = new SemanticRAGSystem();
        await semanticRAG.initialize(documents, ontologyData);

        updateStatus('✅ 準備完了');
        updateStatistics();

        console.log('✅ システム準備完了');
    } catch (error) {
        console.error('初期化エラー:', error);
        updateStatus('❌ 初期化失敗');
    }
}

        
        // 質問処理（基本実装）
        async function processQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            
            if (!question) {
                alert('質問を入力してください');
                return;
            }
            
            const responseArea = document.getElementById('response-area');
            responseArea.className = 'show';
            responseArea.innerHTML = '<p>🤔 考え中...</p>';
            
            try {
                // SemanticRAGで回答生成
                const result = await semanticRAG.semanticQuery(question);
                
                // 回答を表示
                responseArea.innerHTML = `
                    <h3>💡 回答</h3>
                    <p>${result.answer}</p>
                    
                    <h4 style="margin-top: 15px;">🔗 関連概念</h4>
                    <p>${result.concepts.join(', ')}</p>
                    
                    <h4 style="margin-top: 15px;">📚 参考文書</h4>
                    <p>${result.sources.length}件の文書を参照しました</p>
                `;
                
                // 統計を更新
                questionCount++;
                updateStatistics();
                
            } catch (error) {
                responseArea.innerHTML = `
                    <p style="color: red;">❌ エラー: ${error.message}</p>
                `;
            }
        }
        
        // 回答クリア
        function clearResponse() {
            document.getElementById('response-area').className = '';
            document.getElementById('question-input').value = '';
        }
        
        // システム状態を更新
        function updateStatus(message) {
            document.getElementById('system-status').innerHTML = `
                <p style="padding: 10px; background: white; border-radius: 5px;">
                    ${message}
                </p>
            `;
        }
        
        // 統計情報を更新
        function updateStatistics() {
            const stats = document.getElementById('statistics');
            stats.innerHTML = `
                <p style="padding: 10px; background: white; border-radius: 5px;">
                    質問数: ${questionCount}回<br>
                    登録文書: ${semanticRAG ? semanticRAG.ragSystem.documents.length : 0}件<br>
                    概念数: ${semanticRAG ? Object.keys(semanticRAG.ontology.concepts).length : 0}個
                </p>
            `;
        }
        
        // ページ読み込み時に初期化
        window.onload = initialize;
    </script>
</body>
</html>
